name: Build NoSpotifyLyrics .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install iOS SDK
        run: |
          export THEOS=${{ github.workspace }}/theos
          curl -L https://github.com/theos/sdks/releases/download/ios-16.5/iPhoneOS16.5.sdk.tar.xz \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -o /tmp/sdk.tar.xz
          mkdir -p $THEOS/sdks
          tar -xJf /tmp/sdk.tar.xz -C $THEOS/sdks

      - name: Build .deb (rootless)
        run: |
          export THEOS=${{ github.workspace }}/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSpotifyLyrics-deb
          path: packages/*.deb
          if-no-files-found: error
