name: Build NoSpotifyLyrics .deb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        env:
          THEOS: ${{ github.workspace }}/theos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install iOS SDK
        run: |
          export THEOS=${{ github.workspace }}/theos
          mkdir -p $THEOS/sdks
          gh release download "SDK Release 1" \
            --repo theos/sdks \
            --pattern "iPhoneOS16.5.sdk.tar.xz" \
            --output /tmp/sdk.tar.xz
          echo "Downloaded $(du -h /tmp/sdk.tar.xz | cut -f1)"
          tar -xJf /tmp/sdk.tar.xz -C $THEOS/sdks
          ls $THEOS/sdks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .deb (rootless)
        run: |
          export THEOS=${{ github.workspace }}/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoSpotifyLyrics-deb
          path: packages/*.deb
          if-no-files-found: error
